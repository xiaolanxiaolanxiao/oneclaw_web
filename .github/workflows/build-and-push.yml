name: Build and Push to Aliyun ACR

on:
  push:
    branches:
      - main  # 当你向 main 分支 push 代码时触发构建
  workflow_dispatch: # 允许手动点击按钮触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ALIRP_REGISTRY }}
          username: ${{ secrets.ALIRP_USERNAME }}
          password: ${{ secrets.ALIRP_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          # 这里定义生成的镜像 Tag
          tags: |
            ${{ secrets.ALIRP_REGISTRY }}/oneclaw0312/oneclaw-web:v1
            ${{ secrets.ALIRP_REGISTRY }}/oneclaw0312/oneclaw-web:${{ github.sha }}
          # 开启缓存，让下次构建更快
          cache-from: type=gha
          cache-to: type=gha,mode=max